<html>
<body style="background:#0f172a; color:white; text-align:center; font-family:Arial;">

<h1>Hoşgeldin Baharım 🤍</h1>

<input id="user" placeholder="Kullanıcı adı"><br><br>
<input id="pass" type="password" placeholder="Şifre"><br><br>
<button onclick="giris()">Giriş</button>

<div id="icerik"></div>

<script>
function giris(){
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u=="bahar" && p=="askim"){
        document.getElementById("icerik").innerHTML = `
        <h2>BAHARIMMM ❤️</h2>
        <button onclick="muzik()">🎵 Müziği başlat</button>
        <audio id="m">
        <source src="sarki.mp3">
        </audio>
        `;
    }
}

function muzik(){
    document.getElementById("m").play();
}
</script>

</body>
</html>
